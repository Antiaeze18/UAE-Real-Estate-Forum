<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - UAE Real Estate Forum</title>
    <meta name="description" content="Get in touch with UAE Real Estate Forum team. Contact us for support, partnerships, or general inquiries.">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #C8102E;
            --secondary-color: #009639;
            --accent-color: #FFD700;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --background-light: #f8f9fa;
            --border-color: #e5e7eb;
        }
    }

    @layer components {
        .btn-primary {
            @apply bg-[var(--primary-color)] text-white px-6 py-3 rounded-lg font-medium hover:opacity-90 transition-all duration-200;
        }
        
        .nav-link {
            @apply text-gray-700 hover:text-[var(--primary-color)] font-medium transition-colors duration-200;
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/ContactForm.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="contact-app.js"></script>
</body>
</html>
